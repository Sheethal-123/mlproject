<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>
</head>
<body>
    <h1>Welcome to the Student Performance Predictor</h1>

    <form action="/predictdata" method="POST">
        <label for="gender">Gender:</label>
        <select name="gender" id="gender" required>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select><br><br>

        <label for="race/ethnicity">Race/Ethnicity:</label>
        <select name="race/ethnicity" id="race/ethnicity" required>
            <option value="group A">Group A</option>
            <option value="group B">Group B</option>
            <option value="group C">Group C</option>
            <option value="group D">Group D</option>
            <option value="group E">Group E</option>
        </select><br><br>

        <label for="parental level of education">Parental Level of Education:</label>
        <select name="parental level of education" id="parental level of education" required>
            <option value="associate's degree">Associate's Degree</option>
            <option value="bachelor's degree">Bachelor's Degree</option>
            <option value="high school">High School</option>
            <option value="master's degree">Master's Degree</option>
            <option value="some college">Some College</option>
            <option value="some high school">Some High School</option>
        </select><br><br>

        <label for="lunch">Lunch:</label>
        <select name="lunch" id="lunch" required>
            <option value="free/reduced">Free/Reduced</option>
            <option value="standard">Standard</option>
        </select><br><br>

        <label for="test preparation course">Test Preparation Course:</label>
        <select name="test preparation course" id="test preparation course" required>
            <option value="completed">Completed</option>
            <option value="none">None</option>
        </select><br><br>

        <label for="reading score">Reading Score:</label>
        <input type="number" name="reading score" id="reading score" min="0" max="100" required><br><br>

        <label for="writing score">Writing Score:</label>
        <input type="number" name="writing score" id="writing score" min="0" max="100" required><br><br>

        <button type="submit">Predict Math Score</button>
    </form>

    {% if preds is defined %}
        <h2>Predicted Math Score: {{ preds }}</h2>
    {% endif %}
</body>
</html>
